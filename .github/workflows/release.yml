name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-msi:
    name: Build MSI and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Set up .NET (required for WiX v4)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Go binary (Windows amd64)
        shell: bash
        run: |
          mkdir -p installer/out
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.appVersion=${{ steps.version.outputs.version }}" \
            -o installer/out/POSitouch-Integration.exe \
            .

      - name: Build config_writer helper
        shell: bash
        run: |
          cd installer/config_writer
          GOOS=windows GOARCH=amd64 go build -o ../out/config_writer.exe .

      - name: Patch version into installer.wxs
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $wxs = Get-Content installer/installer.wxs -Raw
          $wxs = $wxs -replace 'Version="[0-9]+\.[0-9]+\.[0-9]+"', "Version=`"$version`""
          Set-Content installer/installer.wxs $wxs

      - name: Install WiX v4.0.5 and build MSI
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix extension add --global WixToolset.UI.wixext/4.0.5
          wix extension add --global WixToolset.Util.wixext/4.0.5
          Set-Location installer
          wix build installer.wxs RooamConfigDlg.wxs POSPathsDlg.wxs POSTypeDlg.wxs MICROSDlg.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -o out/RooamPOSAgent-Setup.msi

      - name: Create GitHub Release and upload MSI
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Rooam POS Agent ${{ steps.version.outputs.tag }}"
          body: |
            ## Rooam POS Agent ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download `RooamPOSAgent-Setup.msi` below
            2. Run the installer as Administrator
            3. Follow the setup wizard -- it will auto-detect your POSitouch paths

            ### Requirements
            - Windows 10 / Windows 11
            - POSitouch installed (typically at `C:\SC\`)
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: installer/out/RooamPOSAgent-Setup.msi