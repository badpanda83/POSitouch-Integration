name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-msi:
    name: Build MSI and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Set up .NET (required for WiX v4)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Go binary (Windows amd64)
        shell: bash
        run: |
          mkdir -p installer/out
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.appVersion=${{ steps.version.outputs.version }}" \
            -o installer/out/POSitouch-Integration.exe \
            .

      - name: Build config_writer helper
        shell: bash
        run: |
          cd installer/config_writer
          GOOS=windows GOARCH=amd64 go build -o ../out/config_writer.exe .

      - name: Patch version into installer.wxs
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $wxs = Get-Content installer/installer.wxs -Raw
          $wxs = $wxs -replace 'Version="[0-9]+\.[0-9]+\.[0-9]+"', "Version=\